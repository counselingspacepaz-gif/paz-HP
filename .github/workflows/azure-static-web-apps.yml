name: Build & Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Install dependencies
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build Jekyll
        env:
          JEKYLL_ENV: production
        run: |
          # ビルド成果物を_siteに出力
          rm -rf _site
          bundle exec jekyll build --config _config.yml --baseurl "" --destination _site

      # ----------------------------------------------------
      # 💥 必須: ビルド成果物 (/_site) をArtifactとして保存する
      # ----------------------------------------------------
      - name: Upload Jekyll Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site-artifact
          path: _site

      # ----------------------------------------------------
      # 💥 必須: SWAデプロイステップでArtifactを利用する
      # ----------------------------------------------------
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          # Artifactを使う場合、これらはダミーとして残すか、削除する
          app_location: "/"
          output_location: "" 
          api_location: ""
          skip_app_build: true
          action: "upload"
          # 💡 これが鍵: Artifactとしてアップロードした成果物フォルダを指定
          app_artifact_location: "jekyll-site-artifact"
