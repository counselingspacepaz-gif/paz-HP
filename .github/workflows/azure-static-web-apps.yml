name: Build and Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ main ]
    paths:
      # SWAへのデプロイをトリガーするファイルのリスト
      - '_config.yml'
      - 'assets/**'
      - 'images/**'
      - 'content/**'
      - '**/*.html'
      - '**/*.css'
      - '**/*.md'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  # より短く、ブランチ名のみを示す 'ref_name' を使用
  group: jekyll-swa-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Build Jekyll site (SWA Root Deployment)
        # SWAのルート直下公開を確実にするため、baseurlを空("")で上書きする
        run: bundle exec jekyll build --baseurl "" --trace 

      - name: Sanity check build result & Path Confirmation
        run: |
          echo "Checking built site..."
          if [ ! -f "_site/index.html" ]; then
            echo "Error: index.html missing in _site/"
            exit 1
          fi
          
          # 【重要】生成されたHTMLをチェックし、baseurlが正しく適用されているか確認
          if grep -q 'href="/assets/css/styles.css"' _site/index.html; then
            echo "SUCCESS: CSS path uses root-relative path (baseurl=\"\")."
          else
            echo "FAILURE: CSS path may still contain sub-directory (e.g., /paz-HP/assets/...). Check build command."
            # ファイルが見つからない警告は残しておく
            if [ -f "_site/assets/css/styles.css" ]; then
              echo "CSS asset (styles.css) file found in _site."
            else
              echo "Warning: No primary CSS file found in _site/assets/css/. Check file path."
            fi
            exit 1 # パスの問題が再発しないように、このチェックで失敗させる
          fi

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "" # リポジトリのルートを明示的に指定（君の指摘を採用）
          output_location: "_site" # Jekyllのビルド結果ディレクトリ
          skip_app_build: true
