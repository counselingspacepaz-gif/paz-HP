name: Build and Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ main ]
    paths:
      # SWAへのデプロイをトリガーするファイルのリスト
      - '_config.yml'
      - '_config_swa.yml' # SWA用設定ファイル
      - 'assets/**'
      - 'images/**'
      - 'content/**'
      - '**/*.html'
      - '**/*.css'
      - '**/*.md'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  # ブランチ単位で同時実行を抑止
  group: jekyll-swa-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Assert baseurl in _config_swa.yml
        shell: bash
        run: |
          val=$(ruby -ryaml -e 'puts (YAML.load_file("_config_swa.yml")["baseurl"].inspect)')
          echo "SWA baseurl => ${val}"
          # "" または未定義（nil）を許容。その他はエラーにする
          if [ "$val" != '""' ] && [ "$val" != 'nil' ]; then
            echo "ERROR: _config_swa.yml の baseurl が空ではない（${val}）。\"\" に修正せよ。"
            exit 1
          fi

      - name: Build Jekyll site (SWA Root Deployment)
        # ✅ 設計意図どおり _config_swa.yml のみ適用
        run: bundle exec jekyll build --config _config_swa.yml --trace

      - name: Detect INTERNAL '/paz-HP/' references (href/src only)
        id: detect_subdir_internal
        shell: bash
        run: |
          echo "Scanning built HTML for INTERNAL links with '/paz-HP/'…"
          if grep -RE '(href|src)="/paz-HP/' _site --include='*.html' --line-number; then
            echo "FOUND=true" >> "$GITHUB_OUTPUT"
            echo "Found internal '/paz-HP/' references in built HTML."
          else
            echo "FOUND=false" >> "$GITHUB_OUTPUT"
            echo "No internal '/paz-HP/' references found."
          fi
          echo
          echo "NOTE: 外部絶対URL（https://…/paz-HP/…pdf）はスキップ対象。検出していない。"

      - name: 🛠️ Patch INTERNAL '/paz-HP/' prefixes → '/'
        if: steps.detect_subdir_internal.outputs.FOUND == 'true'
        shell: bash
        run: |
          echo "Applying path patch for INTERNAL links..."
          BEFORE=$(grep -RE '(href|src)="/paz-HP/' _site --include='*.html' | wc -l || true)
          echo "Before patch occurrences: ${BEFORE}"

          # href/src の '/paz-HP/' 接頭辞を '/' に限定置換（HTMLのみ）
          find _site -type f -name "*.html" -print0 | xargs -0 sed -i \
            -e 's|\(href\|src\)="/paz-HP/|\1="/|g'

          AFTER=$(grep -RE '(href|src)="/paz-HP/' _site --include='*.html' | wc -l || true)
          echo "After patch occurrences: ${AFTER}"

          # 代表的なCSSルート相対が得られたか確認（?v=… は許容）
          if grep -Eq 'href="/assets/css/styles\.css(\?v=[^"]*)?"' _site/index.html; then
            echo "SUCCESS: styles.css is referenced via root-relative URL."
          else
            echo "FAILURE: styles.css root-relative link not found after patch."
            grep -n '<link' _site/index.html || true
            exit 1
          fi

      - name: Final sanity (root-relative CSS & no INTERNAL '/paz-HP/' remains)
        shell: bash
        run: |
          echo "Final sanity check…"
          test -f "_site/index.html" || (echo "Error: _site/index.html missing" && exit 1)

          # ルート相対CSS確認（クエリ許容）
          if grep -Eq 'href="/assets/css/styles\.css(\?v=[^"]*)?"' _site/index.html; then
            echo "OK: CSSはルート相対で参照されている。"
          else
            echo "NG: ルート相対CSSリンクが見つからない。テンプレートの relative_url を再点検。"
            grep -n '<link' _site/index.html || true
            exit 1
          fi

          # INTERNAL のみ再検出（外部絶対URLはスルー）
          if grep -RE '(href|src)="/paz-HP/' _site --include='*.html' --line-number; then
            echo "ERROR: INTERNAL '/paz-HP/' references remain in output HTML."
            exit 1
          fi

          echo "OK: No INTERNAL '/paz-HP/' references remain."

      - name: (Optional) Upload built site as artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site-on-failure
          path: _site

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          # 🔒 ハッシュ付きシークレット名（実環境のキーに合わせて変更可）
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_ROCK_024DED110 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ""         # リポジトリのルート
          output_location: "_site" # Jekyllビルド出力
          skip_app_build: true
