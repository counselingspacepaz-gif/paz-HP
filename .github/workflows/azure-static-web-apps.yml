name: Manual SWA Deploy (Jekyll)

on:
  workflow_dispatch:  # 手動トリガー専用

permissions:
  contents: read  # デプロイはトークン方式なので id-token は不要

concurrency:
  group: 'swa-manual'
  cancel-in-progress: true

jobs:
  build_and_deploy:
    name: Build & Deploy Jekyll Site
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ ソース取得
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Ruby / Jekyll 環境セットアップ
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # 3️⃣ Jekyll ビルド
      - name: Build Jekyll site
        run: |
          JEKYLL_ENV=production bundle exec jekyll build --trace
          echo "---- _site contents ----"
          ls -lah _site

      # 4️⃣ サニティチェック（最低限）
      - name: Sanity check built site
        run: |
          for f in \
            _site/index.html \
            _site/assets/css/styles.css \
            _site/images/logo/favicon.ico \
            _site/images/hero/sprout-in-hand.jpg
          do
            if [ ! -f "$f" ]; then
              echo "Missing $f"
              exit 1
            else
              echo "$f OK"
            fi
          done
          # 画像ツリー確認用（任意、デバッグ向け）
          ls -la _site/images || true
          ls -la _site/images/sections || true
          ls -la _site/images/hero || true

      # 5️⃣ Azure Static Web Apps デプロイ
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "/"        # Jekyllはリポジトリルート
          output_location: "_site"
          skip_app_build: true
