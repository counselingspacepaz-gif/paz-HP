name: Build & Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 💡 堅牢化: 同一ワークフローの実行を制御
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 💡 堅牢化: 最小権限の原則に従う
permissions:
  contents: read

jobs:
  # ----------------------------------------------------
  # JOB 1: ビルド (Artifactのルートを_siteごと含める)
  # ----------------------------------------------------
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Install dependencies and Clean up
        run: |
          # 💥 NEW: 壊れたキャッシュを削除し、依存関係を再インストール
          bundle clean --force
          bundle install

      - name: Build Jekyll Site with Trace
        env:
          JEKYLL_ENV: production
        run: |
          # 💥 NEW: --traceオプションを追加し、詳細な失敗ログを出力させる
          bundle exec jekyll build --config _config.yml --baseurl "" --destination _site --trace

      - name: Verify Build Output
        run: |
          if [ ! -f _site/index.html ]; then
            echo "::error:: _site/index.html not found after Jekyll build."
            echo "Jekyll build failed to process index.md. Check the log above for --trace output for clues (e.g., missing layout, Gem issue)."
            exit 1
          fi
          echo "✅ _site/index.html found. Build successful."

      - name: Upload Jekyll Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site-artifact
          path: _site # 💥 修正: _site ディレクトリごとアップロード
          if-no-files-found: error
          
  # ----------------------------------------------------
  # JOB 2: デプロイ (Artifactの _site フォルダを直接参照)
  # ----------------------------------------------------
  deploy:
    runs-on: ubuntu-22.04
    # 必須: buildジョブの完了を待つ
    needs: build
    
    steps:
      - name: Checkout Repository for Deploy
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: jekyll-site-artifact
          path: jekyll-site-artifact 

      - name: Verify Artifact Content (for Debugging)
        run: |
          echo "--- Content of Downloaded Artifact Folder ---"
          # ダウンロード後は jekyll-site-artifact/_site に成果物が格納されるはず
          ls -la jekyll-site-artifact/_site
          echo "---------------------------------------------"

      # SWAにデプロイ
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          # 💥 修正: ダウンロード後のパス jekyll-site-artifact/_site を直接指定
          app_location: "jekyll-site-artifact/_site"
          output_location: "" 
          api_location: ""
          skip_app_build: true
          action: "upload"
