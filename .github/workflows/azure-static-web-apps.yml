- name: Build Jekyll site (SWA Root Deployment)
        # _config_swa.yml のみ適用
        run: bundle exec jekyll build --config _config_swa.yml --trace

      - name: Detect unexpected subdirectory in built HTML
        shell: bash
        run: |
          echo "Scanning built HTML for '/paz-HP/'…"
          if grep -R '/paz-HP/' _site --include='*.html' --line-number; then
            echo "Found unexpected '/paz-HP/' references in built HTML."
            exit 0  # 次のパッチ工程に進む
          else
            echo "No '/paz-HP/' references found. Skipping patch."
            exit 78  # 意図的なスキップコード（任意）※次のステップに continue-on-error 付けないなら不要
          fi

      - name: 🛠️ Path Patching Workaround (remove '/paz-HP/' prefixes)
        if: success() # 直前ステップで検出があったときのみ実行（exit 0 のとき）
        shell: bash
        run: |
          echo "Applying path patching to built files..."
          # 置換前の件数計測（href/src 両対応、クエリ許容）
          BEFORE=$(grep -R '["'\'']\/paz-HP\/assets\/css\/styles\.css' _site --include='*.html' | wc -l || true)
          echo "Before patch, occurrences of styles.css with /paz-HP: ${BEFORE}"

          # href/src の '/paz-HP/' 接頭辞を '/' に限定置換（HTMLのみ）
          find _site -type f -name "*.html" -print0 | xargs -0 sed -i \
            -e 's|\(href\|src\)="/paz-HP/|\1="/|g'

          # 追加で、一般化：assets, images, scripts 配下の典型パスを一括補正
          find _site -type f -name "*.html" -print0 | xargs -0 sed -i \
            -e 's|href="/paz-HP/\(assets\|images\|content\|scripts\)/|\href="/\1/|g' \
            -e 's|src="/paz-HP/\(assets\|images\|content\|scripts\)/|\src="/\1/|g'

          # 置換後の件数計測
          AFTER=$(grep -R '["'\'']\/paz-HP\/assets\/css\/styles\.css' _site --include='*.html' | wc -l || true)
          echo "After patch, occurrences: ${AFTER}"

          # 過剰に'/paz-HP/'が残っていないか最終チェック
          if grep -R '/paz-HP/' _site --include='*.html' --line-number; then
            echo "ERROR: '/paz-HP/' references still remain after patch."
            exit 1
          fi

          # styles.css のルート相対が得られたか最重要確認（?v=… は許容）
          if grep -Eq 'href="/assets/css/styles\.css(\?v=[^"]*)?"' _site/index.html; then
            echo "SUCCESS: styles.css is referenced via root-relative URL."
          else
            echo "FAILURE: styles.css root-relative link not found after patch."
            grep -n '<link' _site/index.html || true
            exit 1
          fi

      - name: Sanity check build result & Path Confirmation
        if: always()
        shell: bash
        run: |
          echo "Final sanity check…"
          test -f "_site/index.html" || (echo "Error: _site/index.html missing" && exit 1)
          if grep -R '/paz-HP/' _site --include='*.html' --line-number; then
            echo "ERROR: '/paz-HP/' still present. Aborting."
            exit 1
          fi
          echo "OK: No '/paz-HP/' references remain."
