name: Build & Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 💡 堅牢化: 同一ワークフローの実行を制御
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 💡 堅牢化: 最小権限の原則に従う
permissions:
  contents: read

jobs:
  # ----------------------------------------------------
  # JOB 1: ビルド (Artifactはディレクトリごとアップロード)
  # ----------------------------------------------------
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Clean Environment & Install dependencies
        run: |
          # 過去のゴミを削除し、依存関係を再インストール
          bundle clean --force
          bundle install

      - name: Build Jekyll Site
        env:
          JEKYLL_ENV: production
        run: |
          # 💥 NEW: --traceオプションを追加し、詳細な失敗ログを出力させる
          bundle exec jekyll build --config _config.yml --baseurl "" --destination _site --trace
      
      # 💥 NEW: ビルド成果物の存在を検証（index.htmlがない場合はここでエラーにする）
      - name: Verify Build Output
        run: |
          if [ ! -f _site/index.html ]; then
            echo "Error: _site/index.html not found after Jekyll build."
            echo "Jekyll build failed to process index.md. Check the log above for --trace output for clues (e.g., missing layout, Gem issue)."
            exit 1
          fi

      - name: Upload Jekyll Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site-artifact
          # ディレクトリ全体をアップロード
          path: _site
          if-no-files-found: error
          
  # ----------------------------------------------------
  # JOB 2: デプロイ (Artifactのサブフォルダ _site を直接参照)
  # ----------------------------------------------------
  deploy:
    runs-on: ubuntu-22.04
    needs: build
    
    steps:
      - name: Checkout Repository for Deploy
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: jekyll-site-artifact
          path: jekyll-site-artifact 

      - name: Verify Artifact Content (for Debugging)
        run: |
          echo "--- Content of Downloaded Artifact Folder ---"
          # -Rで再帰的に中身を表示し、_siteフォルダの存在を確認
          ls -laR jekyll-site-artifact
          echo "---------------------------------------------"

      # SWAにデプロイ
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          # ダウンロード後の確定パスを指定 (jekyll-site-artifact の下の _site)
          app_location: "jekyll-site-artifact/_site" 
          output_location: "" 
          api_location: ""
          skip_app_build: true
          action: "upload"
