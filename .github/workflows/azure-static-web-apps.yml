name: Build & Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # JOB 1: ビルド (変更なし)
  # ----------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Build Jekyll Site
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build --config _config.yml --baseurl "" --destination _site

      - name: Upload Jekyll Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site-artifact
          path: _site

  # ----------------------------------------------------
  # JOB 2: デプロイ (修正点あり)
  # ----------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      # 💥 修正1: デプロイジョブでもワークスペースを初期化する
      - name: Checkout Repository for Deploy
        uses: actions/checkout@v4

      # 💥 修正2: Artifactをダウンロードする
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: jekyll-site-artifact
          # 💡 ダウンロード先を明示的に指定
          path: jekyll-site-artifact 

      # 3. Azure SWAにデプロイ
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          # 成果物は 'jekyll-site-artifact' フォルダの中にある
          app_location: "jekyll-site-artifact" 
          output_location: "" 
          api_location: ""
          skip_app_build: true
          action: "upload"
