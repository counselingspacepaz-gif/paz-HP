name: Build & Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Install dependencies
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build Jekyll
        env:
          JEKYLL_ENV: production
        run: |
          # 以前のビルド成果物を削除し、Jekyllをビルドして_siteに出力
          rm -rf _site
          bundle exec jekyll build --config _config.yml --baseurl "" --destination _site

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          # 修正ポイント:
          # app_locationはソースコードのルート
          app_location: "/"
          # app_artifact_locationはビルド成果物 (index.html, CSS, JSなど) の場所
          app_artifact_location: "_site"
          # 既に手動でJekyllをビルドしているため、SWAのビルドをスキップする
          skip_app_build: true
          action: "upload"
