name: Build & Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 💡 堅牢化: 同一ワークフローの実行を制御
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 💡 堅牢化: 最小権限の原則に従う
permissions:
  contents: read

jobs:
  # ----------------------------------------------------
  # JOB 1: ビルド (Artifactのルートを平坦化)
  # ----------------------------------------------------
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Build Jekyll Site
        env:
          JEKYLL_ENV: production
        run: |
          # Jekyllをビルドし、_siteに出力
          bundle exec jekyll build --config _config.yml --baseurl "" --destination _site

      - name: Upload Jekyll Artifact
        uses: actions/upload-artifact@v4 # メジャーバージョン
        with:
          name: jekyll-site-artifact
          path: _site/**
          if-no-files-found: error
          
  # ----------------------------------------------------
  # JOB 2: デプロイ (Artifactをそのままアプリとして参照)
  # ----------------------------------------------------
  deploy:
    runs-on: ubuntu-22.04
    # 必須: buildジョブの完了を待つ
    needs: build
    
    steps:
      - name: Checkout Repository for Deploy
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4 # メジャーバージョン
        with:
          name: jekyll-site-artifact
          path: jekyll-site-artifact 

      - name: Verify Artifact Content (for Debugging)
        run: |
          echo "--- Content of Downloaded Artifact Folder ---"
          ls -la jekyll-site-artifact
          echo "---------------------------------------------"

      # SWAにデプロイ
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1 # メジャーバージョン
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          app_location: "jekyll-site-artifact" 
          output_location: "" 
          api_location: ""
          skip_app_build: true
          action: "upload"
