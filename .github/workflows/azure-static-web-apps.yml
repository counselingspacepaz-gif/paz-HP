# name: Build & Deploy Jekyll to Azure Static Web Apps (separated build)
# ... (他の設定は省略) ...

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ... (Step 1 から Step 5 は省略) ...

      # 6) Azure Static Web Appsへ配信（内部ビルド無効化）
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          app_location: "/"               # 💡 修正: ソースコードのルートを指定
          output_location: "_site"        # 💡 追加: 成果物の場所を明示
          skip_app_build: true            # Oryxの内部ビルドを完全停止
          action: upload
