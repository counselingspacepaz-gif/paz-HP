name: Build & Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Install dependencies
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build Jekyll
        env:
          JEKYLL_ENV: production
        run: |
          rm -rf _site
          bundle exec jekyll build --config _config.yml --baseurl "" --destination _site

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          app_location: "/"            # ソースコードの場所
          output_location: "_site"     # ビルド成果物の場所
          skip_app_build: true         # Oryxビルドを完全停止
