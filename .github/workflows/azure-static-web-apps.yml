name: Build and Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ main ]
    paths:
      - '_config.yml'
      - 'assets/**'
      - 'images/**'
      - 'content/**'
      - 'favicon.ico'
      - 'robots.txt'
      - '**/*.html'
      - '**/*.css'
      - '**/*.md'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: jekyll-swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Build Jekyll site
        run: bundle exec jekyll build --trace

      - name: Sanity check build result
        run: |
          echo "Checking built site..."
          if [ ! -f "_site/index.html" ]; then
            echo "Error: index.html missing in _site/"
            exit 1
          fi
          if [ -f "_site/assets/main.css" ] || [ -f "_site/assets/css/styles.css" ]; then
            echo "CSS asset found."
          else
            echo "Warning: no CSS file found."
          fi
          if [ -f "_site/favicon.ico" ]; then
            echo "Favicon found."
          else
            echo "No favicon (optional)."
          fi

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          app_artifact_location: "_site"
          skip_app_build: true
