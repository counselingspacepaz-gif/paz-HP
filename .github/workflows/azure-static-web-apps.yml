name: Build & Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # JOB 1: ビルド (HTMLファイルを生成し、Artifactとしてアップロード)
  # ----------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Build Jekyll Site
        env:
          JEKYLL_ENV: production
        run: |
          # ビルド成果物を_siteに出力
          bundle exec jekyll build --config _config.yml --baseurl "" --destination _site

      - name: Upload Jekyll Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site-artifact
          path: _site
          # アップロード後、このジョブは終了

  # ----------------------------------------------------
  # JOB 2: デプロイ (Artifactをダウンロードし、SWAに強制的に渡す)
  # ----------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build # 'build'ジョブの完了を待つ
    
    steps:
      # 1. Artifactをダウンロードする
      # ダウンロードされたファイルは './jekyll-site-artifact' フォルダに格納される
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: jekyll-site-artifact

      # 2. Azure SWAにデプロイ
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          # 💥 鍵: app_locationをダウンロードしたArtifactのフォルダ名に強制設定する
          # これにより、SWAアクションがリポジトリのルート('/')ではなく、Artifactフォルダの中を見に行く
          app_location: "jekyll-site-artifact"
          output_location: "" 
          api_location: ""
          skip_app_build: true
          action: "upload"
