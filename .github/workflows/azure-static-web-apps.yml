name: Build and Deploy Jekyll to Azure Static Web Apps

on:
  workflow_dispatch:
  # 運用移行時に下記を有効化
  # push:
  #   branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby (stable)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Sanity check build result
        run: |
          echo "🔍 Checking built site..."
          ls -lah _site | head -20

          if [ ! -f "_site/index.html" ]; then
            echo "❌ index.html missing in _site/"
            exit 1
          fi

          if [ -f "_site/assets/main.css" ] || [ -f "_site/assets/css/styles.css" ]; then
            echo "✅ CSS asset found."
          else
            echo "⚠️ No CSS found (check theme or custom assets)."
          fi

          if [ -f "_site/images/logo/favicon.ico" ]; then
            echo "🖼 favicon found."
          else
            echo "ℹ️ favicon missing (optional)."
          fi

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "_site" # ✅ 現行仕様に準拠
          skip_app_build: true # ✅ Jekyllは既にビルド済
