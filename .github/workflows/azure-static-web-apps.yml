name: Build and Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ main ]
    paths:
      # SWAへのデプロイをトリガーするファイルのリスト
      - '_config.yml'
      - '_config_swa.yml' # SWA用設定ファイル
      - 'assets/**'
      - 'images/**'
      - 'content/**'
      - '**/*.html'
      - '**/*.css'
      - '**/*.md'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  # ブランチ単位で同時実行を抑止
  group: jekyll-swa-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Assert baseurl in _config_swa.yml
        shell: bash
        run: |
          val=$(ruby -ryaml -e 'puts (YAML.load_file("_config_swa.yml")["baseurl"].inspect)')
          echo "SWA baseurl => ${val}"
          if [ "$val" != '""' ] && [ "$val" != 'nil' ]; then
            echo "ERROR: _config_swa.yml の baseurl が空ではない（${val}）。\"\" に修正せよ。"
            exit 1
          fi

      - name: Build Jekyll site (SWA Root Deployment)
        # ✅ 設計意図どおり _config_swa.yml のみ適用
        run: bundle exec jekyll build --config _config_swa.yml --trace

      - name: 🛠️ Patch INTERNAL '/paz-HP/' prefixes → '/'
        # 👑 最も確実な置換: 内部リンクの '/paz-HP/' を強制的に '/' に置換する。
        # 置換対象を、内部アセットを示す href="/paz-HP/images" や href="/paz-HP/" などに限定する。
        shell: bash
        run: |
          echo "Applying final, aggressive path patch for INTERNAL links..."
          
          # 置換前の件数計測（内部リンクのみを対象とする）
          BEFORE=$(grep -RE '(href|src)="/paz-HP/' _site --include='*.html' | wc -l || true)
          echo "Before patch occurrences: ${BEFORE}"

          # 置換コマンド（再試行）：findとsedの組み合わせを信頼性の高い形に再構築
          # ※ `\1` は 'href' または 'src' のキャプチャグループを参照する
          find _site -type f -name "*.html" -exec sed -i \
            -e 's|\(href\|src\)="/paz-HP/|\1="/|g' {} \;
            
          AFTER=$(grep -RE '(href|src)="/paz-HP/' _site --include='*.html' | wc -l || true)
          echo "After patch occurrences: ${AFTER}"
          
          # パッチ後にも内部リンクの '/paz-HP/' が残っていれば、即座にエラーとする。
          if [ "$AFTER" -ne 0 ]; then
              echo "FATAL ERROR: INTERNAL '/paz-HP/' references remain after patch."
              grep -RE '(href|src)="/paz-HP/' _site --include='*.html' --line-number
              exit 1
          fi
          echo "OK: All internal '/paz-HP/' references successfully patched."


      - name: Final sanity (root-relative CSS & no INTERNAL '/paz-HP/' remains)
        shell: bash
        run: |
          echo "Final sanity check…"
          test -f "_site/index.html" || (echo "Error: _site/index.html missing" && exit 1)

          # ルート相対CSS確認（クエリ許容）
          if grep -Eq 'href="/assets/css/styles\.css(\?v=[^"]*)?"' _site/index.html; then
            echo "OK: CSSはルート相対で参照されている。"
          else
            echo "NG: ルート相対CSSリンクが見つからない。致命的なエラー。"
            exit 1
          fi

          # 既に前のステップでゼロ件チェックしているため、ここでは単純に成功として処理を進める。
          echo "OK: デプロイ準備完了。"

      - name: (Optional) Upload built site as artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site-on-failure
          path: _site

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          # 🔒 ハッシュ付きシークレット名（君の正しいシークレットを使用すること）
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_ROCK_024DED110 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ""         # リポジトリのルート
          output_location: "_site" # Jekyllビルド出力
          skip_app_build: true
