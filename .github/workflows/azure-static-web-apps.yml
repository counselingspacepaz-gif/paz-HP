name: Build & Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Install dependencies
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build Jekyll
        env:
          JEKYLL_ENV: production
        run: |
          # 以前のビルド成果物を削除し、Jekyllをビルドして_siteに出力
          rm -rf _site
          bundle exec jekyll build --config _config.yml --baseurl "" --destination _site

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          # 1. ソースコードの場所をルートに設定
          app_location: "/"
          # 2. デプロイ成果物の場所を 'output_location' で明示
          output_location: "_site"
          # APIのデプロイをしない場合は空文字に
          api_location: ""
          # ビルドは手動で行ったためスキップ (これは正しい)
          skip_app_build: true
          action: "upload"
