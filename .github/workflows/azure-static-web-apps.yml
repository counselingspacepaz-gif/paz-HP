name: Build and Deploy Jekyll to Azure Static Web Apps

on:
  push:
    branches: [ main ]
    paths:
      # SWAへのデプロイをトリガーするファイルのリスト
      - '_config.yml'
      - '_config_swa.yml' # SWA用設定ファイル
      - 'assets/**'
      - 'images/**'
      - 'content/**'
      - '**/*.html'
      - '**/*.css'
      - '**/*.md'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  # ブランチ単位で同時実行を抑止
  group: jekyll-swa-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Build Jekyll site (SWA Root Deployment)
        # ✅ 統合方針に従い、_config_swa.yml のみ適用
        run: bundle exec jekyll build --config _config_swa.yml --trace

      - name: Sanity check build result & Path Confirmation
        shell: bash
        run: |
          echo "Checking built site..."
          if [ ! -f "_site/index.html" ]; then
            echo "Error: index.html missing in _site/"
            exit 1
          fi

          # baseurl:"" が効いているか最重要の1点を検査（CSSパスがルート相対になっているか）
          if grep -q 'href="/assets/css/styles.css"' _site/index.html; then
            echo "SUCCESS: CSS path uses root-relative path (baseurl=\"\")."
          else
            echo "FAILURE: CSS path may still contain sub-directory. Check build command or templates."
            if [ -f "_site/assets/css/styles.css" ]; then
              echo "INFO: _site/assets/css/styles.css は存在。テンプレートのrelative_url適用を再点検。"
            else
              echo "WARN: _site/assets/css/styles.css が見当たらない。ビルド対象/パスを確認。"
            fi
            exit 1
          fi

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          # 🔒 リポジトリ側で設定したハッシュ付きシークレット名を参照（例： icy-rock-024ded110）
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_ROCK_024DED110 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ""         # リポジトリのルート
          output_location: "_site" # Jekyllビルド出力
