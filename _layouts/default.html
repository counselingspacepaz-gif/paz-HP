<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Jekyll SEO Tag -->
    {% seo %}

    <!-- CSSの読み込み (キャッシュ対策付き) -->
    <link
      rel="stylesheet"
      href="{{ '/assets/css/styles.css?v=20251118-final' | relative_url }}"
    >

    <!-- ファビコンの読み込み -->
    <link
      rel="icon"
      href="{{ '/favicon.ico' | relative_url }}"
      type="image/x-icon"
    >
      
  </head>

  <body>
    <!-- アクセシビリティ：スキップリンク -->
    <a class="skip-link" href="#main-content">メインコンテンツへスキップ</a>

    {% include header.html %}

    <main id="main-content" role="main">
      {{ content }}
    </main>

    {% include footer.html %}

    <!-- JavaScriptの読み込み (問題解決のためシンプルな絶対パスを使用) -->
    <script src="/assets/js/main.js"></script>

  </body>
</html>
