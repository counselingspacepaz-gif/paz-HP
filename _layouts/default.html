<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Jekyll SEO Tag -->
    {% seo %}

    <!-- CSSの読み込み (キャッシュ対策付き) -->
    <!-- Liquidフィルタ順序修正: relative_urlを先に実行し、クエリパラメータをHTMLとして後続させる -->
    <link
      rel="stylesheet"
      href="{{ '/assets/css/styles.css' | relative_url }}?v={{ site.build_version }}"
    >

    <!-- ファビコンの読み込み -->
    <link
      rel="icon"
      href="{{ '/images/logo/favicon.ico' | relative_url }}"
      type="image/x-icon"
    >
      
  </head>

  <body>
    <!-- アクセシビリティ：スキップリンク -->
    <a class="skip-link" href="#main-content">メインコンテンツへスキップ</a>

    {% include header.html %}

    <main id="main-content" role="main">
      {{ content }}
    </main>

    {% include footer.html %}

    <!-- **最終修正ポイント**: Liquidフィルタ順序を修正し、defer属性を追加。 -->
    <!-- relative_urlを先に適用し、クエリパラメータはHTMLとして後続させる。 -->
    <script 
      src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.build_version }}"
      defer
    ></script>

  </body>
</html>
