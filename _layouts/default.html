<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Jekyll SEO Tag -->
    {% seo %}

    <!-- CSSの読み込み (キャッシュ対策付き) -->
    <!-- ビルドバージョンを使用してキャッシュを強制的に更新 -->
    <link
      rel="stylesheet"
      href="{{ '/assets/css/styles.css?v=' | append: site.build_version | relative_url }}"
    >

    <!-- ファビコンの読み込み: パスは /images/logo/favicon.ico が正しい -->
    <link
      rel="icon"
      href="{{ '/images/logo/favicon.ico' | relative_url }}"
      type="image/x-icon"
    >
      
  </head>

  <body>
    <!-- アクセシビリティ：スキップリンク -->
    <a class="skip-link" href="#main-content">メインコンテンツへスキップ</a>

    {% include header.html %}

    <main id="main-content" role="main">
      {{ content }}
    </main>

    {% include footer.html %}

    <!-- JavaScriptの読み込み (キャッシュバスター付き) -->
    <!-- ビルドバージョンを使用してキャッシュを強制的に更新 -->
    <script src="{{ '/assets/js/main.js?v=' | append: site.build_version | relative_url }}"></script>

  </body>
</html>
