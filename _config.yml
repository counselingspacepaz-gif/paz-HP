# --------------------------------------
# _config.yml（Jekyll設定・最終版）
# --------------------------------------

# 相対パス崩れ防止
baseurl: ""

# デバッグ時：SWA標準URL
url: "https://icy-rock-024ded110.1.azurestaticapps.net"
# DNS切替後は本番URLに変更可能

# 出力先指定
destination: _site

# URL構造をきれいに（SEO向上）
permalink: pretty

# 静的資産を必ず含める
include:
  - assets
  - images
  - content
  - favicon.ico
  - robots.txt

# Markdown処理
markdown: kramdown

# プラグイン（Gemfileと合わせる）
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# （任意）将来的にカスタム設定や追加プラグインがあればここに追記可能
